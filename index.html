<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Regulate">
<meta name="theme-color" content="#12151f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<title>Regulate</title>
<style>
  :root {
    --bg: #12151f;
    --surface: #1b2130;
    --surface2: #242b40;
    --line: #2e3650;
    --text: #e9eaf2;
    --muted: #8b91a7;
    --accent: #8f9dff;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--bg); }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    color: var(--text);
    display: flex;
    justify-content: center;
    min-height: 100vh;
  }
  #phone { width: 100%; max-width: 430px; min-height: 100vh; display: flex; flex-direction: column; }
  header {
    display: flex; justify-content: space-between; align-items: center;
    padding: calc(18px + env(safe-area-inset-top, 0px)) 20px 10px;
  }
  header .brand { font-weight: 700; font-size: 20px; letter-spacing: -0.02em; }
  header .right { display: flex; align-items: baseline; gap: 12px; }
  header .count { color: var(--muted); font-size: 12px; }
  header .gear {
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: 17px; padding: 2px 4px; font-family: inherit;
  }
  main { flex: 1; padding: 8px 20px 20px; overflow-y: auto; }
  nav {
    display: flex; border-top: 1px solid var(--line); background: var(--surface);
    padding-bottom: env(safe-area-inset-bottom, 6px);
  }
  nav button {
    flex: 1; background: none; border: none; cursor: pointer;
    color: var(--muted); padding: 10px 0 6px;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    font-family: inherit;
  }
  nav button.active { color: var(--accent); }
  nav button .icon { font-size: 18px; line-height: 1; }
  nav button .lbl { font-size: 11px; font-weight: 500; }
  nav button.active .lbl { font-weight: 700; }

  .fadein { animation: fadein 0.22s ease-out; }
  @keyframes fadein { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  .prompt { font-size: 21px; font-weight: 600; margin: 10px 0 18px; letter-spacing: -0.01em; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .tile {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    padding: 18px 8px; border-radius: 18px; cursor: pointer;
    color: var(--text); font-family: inherit; transition: transform 0.1s ease;
  }
  .tile:active { transform: scale(0.96); }
  .tile .emoji { font-size: 34px; line-height: 1; }
  .tile .name { font-size: 13px; font-weight: 600; }
  .hint { color: var(--muted); font-size: 12px; text-align: center; margin-top: 18px; }
  .toolkit-link {
    display: block; width: 100%; margin-top: 14px; padding: 12px 0;
    background: none; border: 1.5px dashed var(--line); border-radius: 14px;
    color: var(--muted); font-size: 13px; cursor: pointer; font-family: inherit;
  }
  .toolkit-link:active { color: var(--accent); border-color: var(--accent); }

  .back { background: none; border: none; color: var(--muted); font-size: 13.5px; cursor: pointer; padding: 4px 0; font-family: inherit; }
  .em-head { display: flex; align-items: center; gap: 12px; margin: 10px 0 20px; }
  .em-head .emoji { font-size: 40px; }
  .em-head .name { font-size: 24px; font-weight: 600; }

  .field-label {
    font-size: 12.5px; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px;
  }
  .field-label .opt { font-weight: 400; text-transform: none; letter-spacing: 0; opacity: 0.7; }

  .slider-wrap { margin-bottom: 26px; text-align: center; }
  .slider-val { font-size: 42px; font-weight: 700; line-height: 1; margin-bottom: 14px; }
  input[type="range"] {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 10px; border-radius: 999px;
    background: var(--surface2); border: 1.5px solid var(--line);
    outline: none; margin: 0;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--c, var(--accent));
    border: 3px solid var(--bg);
    box-shadow: 0 0 0 1.5px var(--c, var(--accent));
    cursor: pointer;
  }
  input[type="range"]::-moz-range-thumb {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--c, var(--accent));
    border: 3px solid var(--bg);
    box-shadow: 0 0 0 1.5px var(--c, var(--accent));
    cursor: pointer;
  }
  .slider-scale { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-top: 10px; }

  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 22px; }
  .chips button {
    padding: 9px 14px; border-radius: 999px;
    border: 1.5px solid var(--line); background: var(--surface);
    color: var(--text); font-size: 13px; cursor: pointer; font-family: inherit;
  }
  textarea {
    width: 100%; background: var(--surface); border: 1.5px solid var(--line);
    border-radius: 14px; color: var(--text); font-size: 14px;
    padding: 12px 14px; font-family: inherit; resize: none; outline: none;
  }
  .big-btn {
    display: block; width: 100%; padding: 16px 0; border-radius: 16px;
    border: none; color: #12151f; font-size: 16px; font-weight: 700;
    cursor: pointer; font-family: inherit; margin-top: 20px;
  }
  .ghost-btn {
    display: block; width: 100%; padding: 13px 0; margin-top: 10px;
    border-radius: 16px; border: none; background: none;
    color: var(--muted); font-size: 14px; cursor: pointer; font-family: inherit;
  }
  .center { text-align: center; }
  .check {
    width: 68px; height: 68px; border-radius: 50%; margin: 28px auto 18px;
    display: flex; align-items: center; justify-content: center; font-size: 30px;
  }
  .insight { font-size: 15.5px; line-height: 1.55; max-width: 300px; margin: 0 auto 26px; }
  .offer-q { color: var(--muted); font-size: 13px; margin-bottom: 12px; }

  .tool-title { font-size: 24px; font-weight: 700; margin: 6px 0 10px; letter-spacing: -0.01em; }
  .tool-body { color: var(--muted); font-size: 14.5px; line-height: 1.6; max-width: 320px; margin: 0 auto; }
  .timer { font-size: 56px; font-weight: 700; margin: 26px 0; }

  .tool-card {
    display: flex; align-items: center; gap: 14px; width: 100%;
    background: var(--surface); border: 1.5px solid var(--line); border-radius: 18px;
    padding: 16px; margin-bottom: 10px; cursor: pointer; font-family: inherit;
    color: var(--text); text-align: left;
  }
  .tool-card .emoji { font-size: 28px; }
  .tool-card .t { font-size: 15px; font-weight: 700; }
  .tool-card .s { font-size: 12.5px; color: var(--muted); margin-top: 2px; }

  .breath-wrap { height: 190px; display: flex; align-items: center; justify-content: center; margin: 18px 0; }
  .breath-wrap.small { height: 130px; margin: 10px 0; }
  #breath-circle {
    width: 100px; height: 100px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #9d6bff66, #9d6bff22);
    border: 2px solid #9d6bff; transform: scale(1);
  }
  .breath-wrap.small #breath-circle { width: 70px; height: 70px; }
  .breath-phase { font-size: 22px; font-weight: 600; color: #b79aff; margin-bottom: 22px; }

  .rsd-card {
    background: var(--surface); border: 1.5px solid #ff5d9e55; border-radius: 18px;
    padding: 22px 18px; margin: 18px 0; text-align: left; font-size: 15.5px; line-height: 1.6;
  }

  /* STOPP */
  .stopp-dots { display: flex; justify-content: center; gap: 7px; margin: 6px 0 16px; }
  .sdot { width: 8px; height: 8px; border-radius: 50%; background: var(--surface2); border: 1.5px solid var(--line); }
  .sdot.done { background: var(--accent); border-color: var(--accent); }
  .stopp-letter { font-size: 46px; font-weight: 800; letter-spacing: -0.02em; color: var(--accent); margin: 4px 0 2px; }
  .stopp-card {
    background: var(--surface); border: 1.5px solid var(--line); border-radius: 18px;
    padding: 18px; margin: 16px 0; text-align: left; font-size: 14.5px; line-height: 1.65;
    color: var(--text);
  }
  .stopp-card ul { margin: 0; padding-left: 18px; }
  .stopp-card li { margin-bottom: 8px; color: var(--muted); }
  .stopp-card li:last-child { margin-bottom: 0; }
  .credit { color: var(--muted); font-size: 10.5px; text-align: center; margin-top: 16px; line-height: 1.5; }

  /* practice */
  .slot-card {
    display: flex; align-items: center; gap: 14px; width: 100%;
    background: var(--surface); border: 1.5px solid var(--line); border-radius: 18px;
    padding: 16px; margin-bottom: 10px; cursor: pointer; font-family: inherit;
    color: var(--text); text-align: left;
  }
  .slot-card.done { border-color: rgba(79,208,140,0.5); }
  .slot-card .emoji { font-size: 28px; }
  .slot-card .t { font-size: 15px; font-weight: 700; }
  .slot-card .s { font-size: 12.5px; color: var(--muted); margin-top: 2px; }
  .week-strip {
    display: flex; justify-content: space-between; gap: 6px;
    background: var(--surface); border: 1.5px solid var(--line); border-radius: 18px;
    padding: 14px 16px; margin-top: 14px;
  }
  .week-day { display: flex; flex-direction: column; align-items: center; gap: 6px; flex: 1; }
  .week-day .lbl { font-size: 10.5px; color: var(--muted); }
  .pdot { width: 9px; height: 9px; border-radius: 50%; background: transparent; border: 1.5px solid var(--line); }
  .pdot.on { background: var(--accent); border-color: var(--accent); }

  .insight-card {
    background: var(--surface); border: 1.5px solid var(--line); border-radius: 14px;
    padding: 12px 14px; margin-bottom: 8px; font-size: 13.5px; line-height: 1.5;
  }
  .dim-toggle { display: flex; gap: 6px; margin-bottom: 14px; }
  .dim-toggle button {
    flex: 1; padding: 9px 0; border-radius: 999px; font-size: 12.5px;
    cursor: pointer; border: 1.5px solid var(--line); background: transparent;
    color: var(--muted); font-weight: 600; font-family: inherit;
  }
  .dim-toggle button.active { border-color: var(--accent); background: rgba(143,157,255,0.13); color: var(--accent); }

  .chart { display: flex; align-items: flex-end; gap: 8px; height: 150px; margin-bottom: 6px; }
  .chart .col { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; height: 100%; gap: 4px; }
  .chart .bar { width: 100%; max-width: 44px; background: var(--accent); border-radius: 6px 6px 0 0; min-height: 2px; }
  .chart .val { font-size: 11px; color: var(--muted); }
  .chart-labels { display: flex; gap: 8px; margin-bottom: 24px; }
  .chart-labels span { flex: 1; text-align: center; font-size: 11px; color: var(--muted); }
  .empty-note { color: var(--muted); font-size: 13px; text-align: center; margin: 30px 0; }

  .entry {
    display: flex; align-items: center; gap: 12px;
    background: var(--surface); border: 1.5px solid var(--line);
    border-radius: 14px; padding: 10px 12px; margin-bottom: 8px;
  }
  .entry .emoji { font-size: 22px; }
  .entry .body { flex: 1; min-width: 0; }
  .entry .top { font-size: 13.5px; font-weight: 600; }
  .entry .top .dots { color: var(--muted); font-weight: 400; }
  .entry .sub { font-size: 11.5px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .entry .del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 15px; padding: 4px; font-family: inherit; }

  .empty-state { text-align: center; padding-top: 60px; color: var(--muted); }
  .empty-state .big { font-size: 40px; margin-bottom: 14px; }
  .empty-state p { font-size: 14.5px; line-height: 1.6; }

  /* settings */
  .settings-section {
    background: var(--surface); border: 1.5px solid var(--line);
    border-radius: 18px; padding: 16px; margin-bottom: 14px;
  }
  .settings-section h3 { margin: 0 0 4px; font-size: 15px; font-weight: 700; }
  .settings-section .desc { color: var(--muted); font-size: 12.5px; line-height: 1.5; margin: 0 0 12px; }
  .row-btn {
    display: block; width: 100%; padding: 12px 0; border-radius: 12px;
    border: 1.5px solid var(--line); background: var(--surface2);
    color: var(--text); font-size: 14px; font-weight: 600;
    cursor: pointer; font-family: inherit; margin-bottom: 8px;
  }
  .nudge-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .nudge-row label { font-size: 14px; flex: 1; }
  input[type="time"] {
    background: var(--surface2); border: 1.5px solid var(--line); border-radius: 10px;
    color: var(--text); font-size: 14px; padding: 8px 10px; font-family: inherit;
    color-scheme: dark;
  }
  .switch { position: relative; width: 46px; height: 26px; flex: none; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .switch .slider {
    position: absolute; inset: 0; border-radius: 999px;
    background: var(--surface2); border: 1.5px solid var(--line);
    transition: background 0.15s; cursor: pointer;
  }
  .switch .slider::before {
    content: ""; position: absolute; width: 18px; height: 18px; border-radius: 50%;
    left: 3px; top: 2.5px; background: var(--muted); transition: transform 0.15s, background 0.15s;
  }
  .switch input:checked + .slider { background: rgba(143,157,255,0.3); border-color: var(--accent); }
  .switch input:checked + .slider::before { transform: translateX(19px); background: var(--accent); }
  .status-line { font-size: 12px; color: var(--muted); line-height: 1.5; }
  .status-line.ok { color: #4fd08c; }
  .fineprint { color: var(--muted); font-size: 11.5px; line-height: 1.55; text-align: center; margin-top: 18px; }

  button:focus-visible, input:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  @media (prefers-reduced-motion: reduce) {
    .fadein { animation: none; }
    .tile, .tile:active { transition: none; transform: none; }
    #breath-circle { transition: none !important; }
  }
</style>
</head>
<body>
<div id="phone">
  <header>
    <span class="brand">Regulate</span>
    <span class="right">
      <span class="count" id="entry-count"></span>
      <button class="gear" onclick="app.goTab('settings')" aria-label="Settings">&#9881;&#65039;</button>
    </span>
  </header>
  <main id="main"></main>
  <nav>
    <button id="tab-log" class="active" onclick="app.goTab('log')">
      <span class="icon">＋</span><span class="lbl">Log</span>
    </button>
    <button id="tab-practice" onclick="app.goTab('practice')">
      <span class="icon">☀</span><span class="lbl">Practice</span>
    </button>
    <button id="tab-patterns" onclick="app.goTab('patterns')">
      <span class="icon">◔</span><span class="lbl">Patterns</span>
    </button>
  </nav>
</div>

<script>
"use strict";

/* ============================================================
   REGULATE v4.4 (PWA) — emotional regulation tracker for ADHD.
   Offline-first. All data stays on this device.
   v4.4: Practice tab (2x daily check-ins, 7-day dot history)
   + interactive STOPP walkthrough after the full chain of
   emotion -> intensity -> completed coping tool.
   ============================================================ */

const APP_VERSION = "4.5";

const EMOTIONS = [
  { id: "anger",       label: "Anger",       emoji: "\u{1F620}", color: "#ff6250", tool: "tipp" },
  { id: "frustration", label: "Frustration", emoji: "\u{1F624}", color: "#ff8f40", tool: "tipp" },
  { id: "anxiety",     label: "Anxiety",     emoji: "\u{1F630}", color: "#f2a03d", tool: "breathe" },
  { id: "overwhelm",   label: "Overwhelm",   emoji: "\u{1F30A}", color: "#9d6bff", tool: "breathe" },
  { id: "rsd",         label: "RSD spike",   emoji: "\u{1F494}", color: "#ff5d9e", tool: "rsd" },
  { id: "shutdown",    label: "Shutdown",    emoji: "\u{1FAE5}", color: "#7d8aa6", tool: "breathe" },
  { id: "sad",         label: "Sad",         emoji: "\u{1F622}", color: "#57a0ff", tool: "breathe" },
  { id: "wired",       label: "Wired",       emoji: "\u26A1",    color: "#47e0d2", tool: "breathe" },
  { id: "calm",        label: "Calm",        emoji: "\u{1F60C}", color: "#4fd08c", tool: "breathe" },
  { id: "happy",       label: "Happy",       emoji: "\u{1F60A}", color: "#ffd44f", tool: "breathe" },
];
const TRIGGERS = ["Work", "Family", "Relationship", "Driving", "Task", "Technology", "Unexpected change", "Criticism", "Sensory", "Other"];
const KEY = "regulate-entries";
const SETTINGS_KEY = "regulate-settings";
const DAY_NAMES = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
const OFFER_THRESHOLD = 3; // coping reset offered at this intensity and above

/* STOPP steps — adapted from Carol Vivyan (getselfhelp.co.uk), after Ciarrochi & Bailey */
const STOPP_STEPS = [
  {
    letter: "S", title: "Stop",
    body: "Don't act yet. Step back from the situation in your mind.",
    prompts: null, field: null, cta: "I've stopped \u2192",
  },
  {
    letter: "T", title: "Take a breath",
    body: "One or two slow breaths. Follow the circle.",
    prompts: null, field: null, cta: "Next \u2192", breathe: true,
  },
  {
    letter: "O", title: "Observe",
    body: "Just notice \u2014 no fixing yet.",
    prompts: ["What's actually happening?", "What am I reacting to?", "What's my body doing right now?"],
    field: "observe", cta: "Next \u2192",
  },
  {
    letter: "P", title: "Pull back",
    body: "Get some distance on it.",
    prompts: ["Is this a fact, or an opinion?", "What would I tell a friend in this exact spot?", "Will this matter in 6 months?"],
    field: "pullback", cta: "Next \u2192",
  },
  {
    letter: "P", title: "Practise what works",
    body: "Pick the next move on purpose.",
    prompts: ["What's the most helpful thing to do \u2014 for me, for them, for the situation?", "Does it fit my values?"],
    field: "practise", cta: "Finish \u2713",
  },
];

/* ---------- storage ---------- */
function loadEntries() {
  try {
    const raw = localStorage.getItem(KEY);
    const data = raw ? JSON.parse(raw) : [];
    return Array.isArray(data) ? data : [];
  } catch (e) { return []; }
}
function persist(entries) {
  try { localStorage.setItem(KEY, JSON.stringify(entries)); } catch (e) { /* in-memory still works */ }
}
function loadSettings() {
  try {
    const raw = localStorage.getItem(SETTINGS_KEY);
    const s = raw ? JSON.parse(raw) : {};
    return { nudgeEnabled: !!s.nudgeEnabled, nudgeTime: s.nudgeTime || "20:00", nudgeLastFired: s.nudgeLastFired || "" };
  } catch (e) { return { nudgeEnabled: false, nudgeTime: "20:00", nudgeLastFired: "" }; }
}
function persistSettings(s) {
  try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); } catch (e) {}
}

/* ---------- helpers ---------- */
function emotionById(id) { return EMOTIONS.find(e => e.id === id) || EMOTIONS[0]; }
function timeBucket(d) {
  const h = d.getHours();
  if (h < 6) return "Night";
  if (h < 12) return "Morning";
  if (h < 17) return "Afternoon";
  if (h < 22) return "Evening";
  return "Night";
}
function timeAgo(ts) {
  const mins = Math.floor((Date.now() - ts) / 60000);
  if (mins < 1) return "just now";
  if (mins < 60) return mins + "m ago";
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + "h ago";
  const days = Math.floor(hrs / 24);
  return days === 1 ? "yesterday" : days + "d ago";
}
function esc(s) {
  return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}
function dateStr(d) {
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
}
function todayStr() { return dateStr(new Date()); }
function downloadFile(name, mime, content) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = name;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 4000);
}

/* ---------- insight after save (never judgmental) ---------- */
function buildInsight(entry, priorEntries) {
  if (entry.practice) {
    return entry.practice === "am"
      ? "Morning check-in logged. Baseline captured."
      : "Evening check-in logged. That's the day mapped.";
  }
  const weekAgo = Date.now() - 7 * 86400000;
  const same = priorEntries.filter(e => e.emotion === entry.emotion && e.timestamp >= weekAgo);
  same.push(entry);
  const em = emotionById(entry.emotion);
  if (same.length >= 3) {
    const buckets = {};
    same.forEach(e => { const b = timeBucket(new Date(e.timestamp)); buckets[b] = (buckets[b] || 0) + 1; });
    const top = Object.entries(buckets).sort((a, b) => b[1] - a[1])[0];
    if (top[1] / same.length >= 0.6) {
      return "Logged. That's " + same.length + " " + em.label.toLowerCase() + " entries this week — most land in the " + top[0].toLowerCase() + ".";
    }
    return "Logged. That's " + same.length + " " + em.label.toLowerCase() + " entries this week. Patterns are forming.";
  }
  if (same.length === 2) {
    return "Logged. Second " + em.label.toLowerCase() + " entry this week — you're catching these in real time.";
  }
  const lines = [
    "Logged. Naming it is the first regulation move.",
    "Saved. Noticing counts — that's the pause your brain skips.",
    "Got it. Externalized, so you don't have to hold it.",
    "Logged. Quick catch.",
  ];
  return lines[priorEntries.length % lines.length];
}

/* ---------- dashboard insights (3 max) ---------- */
function dashboardInsights(entries) {
  const out = [];
  if (entries.length < 3) return out;
  const weekAgo = Date.now() - 7 * 86400000;
  const recent = entries.filter(e => e.timestamp >= weekAgo);
  const pool = recent.length >= 3 ? recent : entries;
  const win = recent.length >= 3 ? "this week" : "so far";

  const byEmotion = {};
  pool.forEach(e => byEmotion[e.emotion] = (byEmotion[e.emotion] || 0) + 1);
  const topE = Object.entries(byEmotion).sort((a, b) => b[1] - a[1])[0];
  if (topE && topE[1] >= 2) out.push(emotionById(topE[0]).label + " shows up most " + win + " (" + topE[1] + " entries).");

  const byBucket = {};
  pool.forEach(e => { const b = timeBucket(new Date(e.timestamp)); byBucket[b] = (byBucket[b] || 0) + 1; });
  const topB = Object.entries(byBucket).sort((a, b) => b[1] - a[1])[0];
  if (topB && pool.length >= 4 && topB[1] / pool.length >= 0.4) {
    out.push(topB[0] + "s carry the most entries — worth planning buffers there.");
  }

  const byTrigger = {};
  pool.forEach(e => { if (e.trigger_tag) byTrigger[e.trigger_tag] = (byTrigger[e.trigger_tag] || 0) + 1; });
  const topT = Object.entries(byTrigger).sort((a, b) => b[1] - a[1])[0];
  if (topT && topT[1] >= 2) out.push('"' + topT[0] + '" is your most-tagged trigger ' + win + ".");

  return out.slice(0, 3);
}

const app = {

  draft: null,
  lastEntryId: null,
  lastInsight: "",
  activeTool: null,
  standaloneTool: false, // true when toolkit opened without a fresh log

  stoppStep: 0,
  stoppAnswers: {},
  patternDim: "time",
  timers: [],
  importStatus: "",

  clearTimers() {
    this.timers.forEach(t => clearTimeout(t));
    this.timers = [];
  },

  goTab(tab) {
    this.tab = tab;
    this.screen = "grid";
    this.draft = null;
    this.activeTool = null;
    this.standaloneTool = false;
    this.practiceSlot = null;
    this.importStatus = "";
    this.render();
  },

  pick(emotionId) {
    this.draft = { emotion: emotionId, intensity: 3, trigger_tag: null, note: "" };
    this.tab = "log";
    this.screen = "detail";
    this.render();
  },

  pickPractice(slot) {
    this.practiceSlot = slot;
    this.tab = "log";
    this.screen = "grid";
    this.render();
  },

  slideIntensity(v) {
    this.draft.intensity = Number(v);
    const el = document.getElementById("slider-val");
    if (el) el.textContent = v;
  },

  toggleTrigger(t) {
    this.draft.trigger_tag = this.draft.trigger_tag === t ? null : t;
    this.render();
  },

  save() {
    const noteEl = document.getElementById("note");
    if (noteEl) this.draft.note = noteEl.value;
    const entry = {
      id: Date.now() + "-" + Math.random().toString(36).slice(2, 7),
      timestamp: Date.now(),
      emotion: this.draft.emotion,
      intensity: this.draft.intensity,
      trigger_tag: this.draft.trigger_tag,
      note: (this.draft.note || "").trim() || null,
      coping_tool_used: null,
      practice: this.practiceSlot || null,
      stopp: null,
    };
    this.lastInsight = buildInsight(entry, this.entries);
    this.entries.unshift(entry);
    persist(this.entries);
    this.lastEntryId = entry.id;
    this.draft = null;
    this.practiceSlot = null;
    this.screen = "saved";
    this.render();
  },

  startTool(toolId) {
    this.activeTool = toolId;
    this.standaloneTool = false;
    this.screen = "tool";
    this.render();
  },

  openToolkit() {
    this.standaloneTool = true;
    this.screen = "toolkit";
    this.render();
  },

  startStandaloneTool(toolId) {
    this.activeTool = toolId;
    this.standaloneTool = true;
    this.screen = "tool";
    this.render();
  },

  finishTool() {
    if (!this.standaloneTool) {
      const e = this.entries.find(x => x.id === this.lastEntryId);
      if (e) { e.coping_tool_used = this.activeTool; persist(this.entries); }
      /* full chain complete (emotion -> intensity -> coping tool):
         launch the STOPP walkthrough. Skippable at every step. */
      this.stoppStep = 0;
      this.stoppAnswers = {};
      this.screen = "stopp";
      this.render();
      return;
    }
    this.home();
  },

  /* ---------- STOPP flow ---------- */
  stoppCapture() {
    const step = STOPP_STEPS[this.stoppStep];
    if (step && step.field) {
      const el = document.getElementById("stopp-input");
      if (el && el.value.trim()) this.stoppAnswers[step.field] = el.value.trim();
    }
  },

  stoppNext() {
    this.stoppCapture();
    if (this.stoppStep >= STOPP_STEPS.length - 1) { this.stoppFinish(); return; }
    this.stoppStep++;
    this.render();
  },

  stoppFinish() {
    const e = this.entries.find(x => x.id === this.lastEntryId);
    if (e && Object.keys(this.stoppAnswers).length > 0) {
      e.stopp = this.stoppAnswers;
      persist(this.entries);
    } else if (e) {
      e.stopp = { completed: true };
      persist(this.entries);
    }
    this.home();
  },

  stoppSkip() {
    this.stoppCapture();
    const e = this.entries.find(x => x.id === this.lastEntryId);
    if (e && Object.keys(this.stoppAnswers).length > 0) {
      e.stopp = this.stoppAnswers;
      persist(this.entries);
    }
    this.home();
  },

  home() {
    this.clearTimers();
    this.tab = "log";
    this.screen = "grid";
    this.draft = null;
    this.activeTool = null;
    this.standaloneTool = false;
    this.practiceSlot = null;
    this.render();
  },

  deleteEntry(id) {
    this.entries = this.entries.filter(e => e.id !== id);
    persist(this.entries);
    this.render();
  },

  setDim(d) { this.patternDim = d; this.render(); },

  /* ---------- data export / import ---------- */
  exportJSON() {
    downloadFile("regulate-export-" + todayStr() + ".json", "application/json",
      JSON.stringify({ app: "Regulate", version: APP_VERSION, exported: new Date().toISOString(), entries: this.entries }, null, 2));
  },

  exportCSV() {
    const header = "id,timestamp_iso,emotion,intensity,trigger,note,coping_tool_used,practice,stopp_observe,stopp_pullback,stopp_practise";
    const rows = this.entries.map(e => {
      const st = e.stopp || {};
      const cells = [
        e.id,
        new Date(e.timestamp).toISOString(),
        e.emotion,
        e.intensity,
        e.trigger_tag || "",
        e.note || "",
        e.coping_tool_used || "",
        e.practice || "",
        st.observe || "",
        st.pullback || "",
        st.practise || "",
      ].map(c => {
        const s = String(c);
        return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
      });
      return cells.join(",");
    });
    downloadFile("regulate-export-" + todayStr() + ".csv", "text/csv", [header].concat(rows).join("\n"));
  },

  importJSON(fileInput) {
    const file = fileInput.files && fileInput.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        const incoming = Array.isArray(data) ? data : (Array.isArray(data.entries) ? data.entries : null);
        if (!incoming) throw new Error("no entries array");
        const known = new Set(this.entries.map(e => e.id));
        let added = 0;
        incoming.forEach(e => {
          if (e && e.id && e.emotion && e.timestamp && !known.has(e.id)) {
            this.entries.push(e);
            known.add(e.id);
            added++;
          }
        });
        this.entries.sort((a, b) => b.timestamp - a.timestamp);
        persist(this.entries);
        this.importStatus = added > 0 ? ("Imported " + added + " new entries.") : "No new entries — everything was already here.";
      } catch (err) {
        this.importStatus = "That file didn't parse. Use a Regulate JSON export.";
      }
      this.render();
    };
    reader.readAsText(file);
  },

  /* ---------- daily nudge ---------- */
  async toggleNudge(checked) {
    if (checked) {
      if (typeof Notification === "undefined") {
        this.settings.nudgeEnabled = true;
      } else if (Notification.permission === "granted") {
        this.settings.nudgeEnabled = true;
      } else {
        try {
          const perm = await Notification.requestPermission();
          this.settings.nudgeEnabled = true;
          void perm;
        } catch (e) { this.settings.nudgeEnabled = true; }
      }
    } else {
      this.settings.nudgeEnabled = false;
    }
    persistSettings(this.settings);
    this.render();
  },

  setNudgeTime(v) {
    this.settings.nudgeTime = v || "20:00";
    persistSettings(this.settings);
  },

  checkNudge() {
    const s = this.settings;
    if (!s.nudgeEnabled) return;
    if (s.nudgeLastFired === todayStr()) return;
    const now = new Date();
    const [hh, mm] = s.nudgeTime.split(":").map(Number);
    if (now.getHours() > hh || (now.getHours() === hh && now.getMinutes() >= mm)) {
      s.nudgeLastFired = todayStr();
      persistSettings(s);
      const msg = "Quick check-in — how's it hitting today? One tap is enough.";
      if (typeof Notification !== "undefined" && Notification.permission === "granted") {
        try { new Notification("Regulate", { body: msg, icon: "icon-192.png" }); return; } catch (e) {}
      }
      if (this.tab === "log" && this.screen === "grid") {
        const main = document.getElementById("main");
        if (main) {
          const el = document.createElement("div");
          el.className = "insight-card fadein";
          el.style.borderColor = "rgba(143,157,255,0.5)";
          el.textContent = msg;
          main.insertBefore(el, main.firstChild);
        }
      }
    }
  },

  nudgeStatusLine() {
    if (!this.settings.nudgeEnabled) return "";
    if (typeof Notification === "undefined") {
      return '<p class="status-line">Notifications aren\u2019t available in this browser \u2014 you\u2019ll get an in-app note instead when the app is open.</p>';
    }
    if (Notification.permission === "granted") {
      return '<p class="status-line ok">Notifications allowed \u2713</p>';
    }
    if (Notification.permission === "denied") {
      return '<p class="status-line">Notifications are blocked in your browser settings \u2014 you\u2019ll get an in-app note instead.</p>';
    }
    return '<p class="status-line">Tap the toggle again if the permission prompt didn\u2019t appear.</p>';
  },

  /* ---------- rendering ---------- */
  render() {
    this.clearTimers();
    document.getElementById("entry-count").textContent = this.entries.length + " logged";
    document.getElementById("tab-log").className = this.tab === "log" ? "active" : "";
    document.getElementById("tab-practice").className = this.tab === "practice" ? "active" : "";
    document.getElementById("tab-patterns").className = this.tab === "patterns" ? "active" : "";

    if (this.tab === "practice") { main.innerHTML = this.viewPractice(); return; }

    if (this.screen === "grid")    { main.innerHTML = this.viewGrid(); return; }
    if (this.screen === "detail")  { main.innerHTML = this.viewDetail(); return; }

  /* ---------- STOPP view ---------- */
  viewStopp() {

  breathCycle(phase) {
    const circle = document.getElementById("breath-circle");
    const label = document.getElementById("breath-phase");
    if (!circle || !label) return;
    const dur = phase === "in" ? 4000 : 6000;
    circle.style.transition = "transform " + (dur / 1000) + "s ease-in-out";
    circle.style.transform = phase === "in" ? "scale(1.55)" : "scale(1)";
    label.textContent = phase === "in" ? "Breathe in\u2026 4" : "Out slow\u2026 6";
    this.timers.push(setTimeout(() => this.breathCycle(phase === "in" ? "out" : "in"), dur));
  },

  tippStart() {
    const startBtn = document.getElementById("tipp-start");
    if (startBtn) startBtn.style.display = "none";
    let left = 60;
    const tick = () => {
      const t = document.getElementById("tipp-timer");
      const doneBtn = document.getElementById("tipp-done");
      if (!t) return;
      if (left <= 0) {
        t.textContent = "Done \u2713";
        t.style.color = "#4fd08c";
        if (doneBtn) { doneBtn.className = "big-btn"; doneBtn.style.background = "#4fd08c"; doneBtn.style.color = "#12151f"; }
        return;
      }
      t.textContent = left + "s";
      left--;
      this.timers.push(setTimeout(tick, 1000));
    };
    tick();
  },

        return '<div class="slot-card done">' +
          '<span class="emoji">' + s.emoji + '</span>' +
          '<span><span class="t">' + s.label + ' \u2713</span><br>' +
          '<span class="s">Logged ' + em.label + ' \u00B7 ' + done.intensity + '/5 \u00B7 ' + timeAgo(done.timestamp) + '</span></span>' +
        '</div>';
      }
      return '<button class="slot-card" onclick="app.pickPractice(\'' + s.id + '\')">' +
        '<span class="emoji">' + s.emoji + '</span>' +
        '<span><span class="t">' + s.label + '</span><br>' +
        '<span class="s">Not yet \u2014 tap to log how you feel</span></span>' +
      '</button>';
    }).join("");

    // 7-day dot strip (today rightmost)
    let strip = "";
    for (let i = 6; i >= 0; i--) {
      const d = new Date(Date.now() - i * 86400000);
      const ds = dateStr(d);
      const am = this.practiceEntryFor(ds, "am") ? " on" : "";
      const pm = this.practiceEntryFor(ds, "pm") ? " on" : "";
      strip += '<div class="week-day">' +
        '<span class="pdot' + am + '"></span>' +
        '<span class="pdot' + pm + '"></span>' +
        '<span class="lbl">' + (i === 0 ? "Today" : DAY_NAMES[d.getDay()]) + '</span>' +
      '</div>';
    }

    return '<div class="fadein">' +
      '<p class="prompt">Daily practice</p>' +
      '<p class="hint" style="text-align:left;margin:0 0 14px">Twice a day, spike or not. Calm days are your baseline \u2014 they matter as much as spike days.</p>' +
      cards +
      '<div class="week-strip">' + strip + '</div>' +
      '<p class="hint">Top dot = morning, bottom = evening. Missed dots are expected, not failures.</p>' +
    '</div>';
  },

  viewPatterns() {
    if (this.entries.length === 0) {
      return '<div class="fadein empty-state">' +
        '<div class="big">\u25D4</div>' +
        '<p>Nothing here yet \u2014 and that\u2019s fine.<br>Patterns show up after a few logs.</p>' +
      '</div>';
    }
    const insights = dashboardInsights(this.entries)
      .map(l => '<div class="insight-card">' + esc(l) + '</div>').join("");

    let data = [];
    if (this.patternDim === "time") {
      const order = ["Morning", "Afternoon", "Evening", "Night"];
      const counts = {};
      this.entries.forEach(e => { const b = timeBucket(new Date(e.timestamp)); counts[b] = (counts[b] || 0) + 1; });
      data = order.map(k => ({ name: k, count: counts[k] || 0 }));
    } else if (this.patternDim === "day") {
      const counts = {};
      this.entries.forEach(e => { const d = DAY_NAMES[new Date(e.timestamp).getDay()]; counts[d] = (counts[d] || 0) + 1; });
      data = DAY_NAMES.map(k => ({ name: k, count: counts[k] || 0 }));
    } else {
      const counts = {};
      this.entries.forEach(e => { if (e.trigger_tag) counts[e.trigger_tag] = (counts[e.trigger_tag] || 0) + 1; });
      data = Object.entries(counts).sort((a, b) => b[1] - a[1])
        .map(([name, count]) => ({ name: name === "Unexpected change" ? "Change" : name, count }));
    }

    const hasData = data.some(d => d.count > 0);
    const max = Math.max(1, ...data.map(d => d.count));
    let chart;
    if (hasData) {
      const cols = data.map(d =>
        '<div class="col">' +
          (d.count > 0 ? '<span class="val">' + d.count + '</span>' : '') +
          '<div class="bar" style="height:' + Math.round((d.count / max) * 100) + '%"></div>' +
        '</div>'
      ).join("");
      const labels = data.map(d => '<span>' + esc(d.name) + '</span>').join("");
      chart = '<div class="chart">' + cols + '</div><div class="chart-labels">' + labels + '</div>';
    } else {
      chart = '<p class="empty-note">No trigger tags yet \u2014 they\u2019re optional, so no pressure.</p>';
    }

    const dims = [["time", "Time of day"], ["day", "Day of week"], ["trigger", "Trigger"]].map(([k, label]) =>
      '<button class="' + (this.patternDim === k ? "active" : "") + '" onclick="app.setDim(\'' + k + '\')">' + label + '</button>'
    ).join("");

    const recent = this.entries.slice(0, 6).map(e => {
      const em = emotionById(e.emotion);
      const dots = "\u25CF".repeat(e.intensity) + "\u25CB".repeat(5 - e.intensity);
      const sub = [
        timeAgo(e.timestamp),
        e.practice ? (e.practice === "am" ? "AM practice" : "PM practice") : null,
        e.trigger_tag || null,
        e.coping_tool_used ? "used a reset" : null,
        e.stopp ? "STOPP \u2713" : null,
        e.note || null,
      ].filter(Boolean).join(" \u00B7 ");
      return '<div class="entry">' +
        '<span class="emoji">' + em.emoji + '</span>' +
        '<div class="body">' +
          '<div class="top" style="color:' + em.color + '">' + em.label + ' <span class="dots">\u00B7 ' + dots + '</span></div>' +
          '<div class="sub">' + esc(sub) + '</div>' +
        '</div>' +
        '<button class="del" aria-label="Delete entry" onclick="app.deleteEntry(\'' + e.id + '\')">\u00D7</button>' +
      '</div>';
    }).join("");

    return '<div class="fadein">' +
      (insights ? '<div style="margin-bottom:20px">' + insights + '</div>' : '') +
      '<div class="dim-toggle">' + dims + '</div>' +
      chart +
      '<div class="field-label" style="margin-bottom:10px">Recent</div>' +
      recent +
    '</div>';
  },

  viewSettings() {
    const s = this.settings;
    return '<div class="fadein">' +
      '<button class="back" onclick="app.home()">\u2190 back</button>' +
      '<p class="prompt">Settings</p>' +

      '<div class="settings-section">' +
        '<h3>Daily nudge</h3>' +
        '<p class="desc">One gentle check-in per day, never more. Object permanence, outsourced.</p>' +
        '<div class="nudge-row">' +
          '<label for="nudge-toggle">Remind me daily</label>' +
          '<span class="switch"><input type="checkbox" id="nudge-toggle" ' + (s.nudgeEnabled ? "checked" : "") + ' onchange="app.toggleNudge(this.checked)"><span class="slider" onclick="document.getElementById(\'nudge-toggle\').click()"></span></span>' +
        '</div>' +
        '<div class="nudge-row">' +
          '<label for="nudge-time">Around what time?</label>' +
          '<input type="time" id="nudge-time" value="' + esc(s.nudgeTime) + '" onchange="app.setNudgeTime(this.value)">' +
        '</div>' +
        this.nudgeStatusLine() +
        '<p class="status-line" style="margin-top:8px">Honest limit: a web app can\u2019t wake your phone on its own. This fires when the app is open (or installed and recently used). For a guaranteed nudge, set matching daily alarms for your AM and PM practice \u2014 the alarms guarantee it, the app rewards it.</p>' +
      '</div>' +

      '<div class="settings-section">' +
        '<h3>Your data</h3>' +
        '<p class="desc">' + this.entries.length + ' entries, stored only on this device. Export a backup any time \u2014 JSON restores into the app, CSV opens in Excel (now includes practice + STOPP columns).</p>' +
        '<button class="row-btn" onclick="app.exportJSON()">Export backup (JSON)</button>' +
        '<button class="row-btn" onclick="app.exportCSV()">Export for spreadsheets (CSV)</button>' +
        '<button class="row-btn" onclick="document.getElementById(\'import-file\').click()">Import a JSON backup</button>' +
        '<input type="file" id="import-file" accept="application/json,.json" style="display:none" onchange="app.importJSON(this)">' +
        (this.importStatus ? '<p class="status-line ok">' + esc(this.importStatus) + '</p>' : '') +
      '</div>' +

      '<p class="fineprint">Regulate v' + APP_VERSION + ' \u00B7 offline-first \u00B7 no accounts, no cloud, no tracking.<br>Data lives in this browser \u2014 clearing site data erases it, so export backups.<br>STOPP skill adapted from Carol Vivyan (getselfhelp.co.uk), after Ciarrochi &amp; Bailey.</p>' +
    '</div>';
  },
};

app.render();

/* daily nudge check: on load and once a minute */
app.checkNudge();
setInterval(() => app.checkNudge(), 60000);

/* register service worker for offline use (skips gracefully on file://) */
if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch(() => { /* offline caching unavailable; app still works */ });
  });
}
</script>
</body>
</html>
